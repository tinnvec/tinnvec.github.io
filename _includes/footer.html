<footer class="footer">
  <div class="container">
    
    <p class="content has-text-centered">
      <strong>{{ site.title }}</strong>
      {% assign site_author = site.data.authors[site.author] %}
      {% if site_author %}
      by <a href="mailto:{{ site_author.email }}">
        {{ site_author.full_name }}
      </a>
      {% endif %}
    </p>

  </div>
</footer>
