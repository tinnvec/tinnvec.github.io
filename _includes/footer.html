<footer class="footer">
  <div class="container">
    
    <div class="content has-text-centered">
      <p>
        <strong>{{ site.title }}</strong>
        {% if site.author.email and site.author.full_name %}
          by
          <a href="mailto:{{ site.author.email }}">
            {{ site.author.full_name }}
          </a>
        {% endif %}
      </p>
    </div>

  </div>
</footer>
