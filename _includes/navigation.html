<nav class="nav">
  <div class="container">
    
    <div class="nav-left">
      <a class="nav-item is-brand" href="{{ "/" }}">
        {{ site.title }}
      </a>
    </div>

    <span class="nav-toggle">
      <span></span>
      <span></span>
      <span></span>
    </span>

    <div class="nav-right nav-menu">
      {% for site_page in site.pages %}

        {% if site_page.nav_name and site_page.url %}
        <a class="nav-item is-tab{% if page.url contains site_page.url %} is-active{% endif %}"
           href="{{ site_page.url }}">
          {{ site_page.nav_name }}
        </a>
        {% endif %}

      {% endfor %}
    </div>

  </div>
</nav>
