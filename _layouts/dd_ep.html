---
layout: default
---
<section class="hero is-info">
  <div class="hero-head">
    {% include navigation.html %}
  </div>
</section>

<section class="section">
  <div class="container">
    <h1 class="title">{{ page.title }}</h1>
    <h2 class="subtitle">
      <i class="fa fa-calendar"></i>
      {{ page.date | date: "%b %-d, %Y" }}
    </h2>
    <div class="content">
      <p>
        {{ page.description }}
      </p>
      <p>
        <iframe width="640" height="40" src="https://archive.org/embed/{{ page.audio.id }}"  frameborder="0" allowfullscreen></iframe>
      </p>
      <p>
        <iframe width="640" height="360" src="https://www.youtube.com/embed/{{ page.video.id }}?rel=0" frameborder="0" allowfullscreen></iframe>
      </p>
    </div>
  </div>
</section>
