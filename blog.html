---
layout: default
title: scratch that
permalink: /blog/
---
<section class="hero is-info is-medium">
  <div class="hero-body">
    <div class="container">
      <h1 class="title is-1">{{ page.title }}</h1>
      <h2 class="subtitle">just some thoughts and code</h2>
    </div>
  </div>
</section>

<section class="section">
  {% for post in site.posts %}
  <h1 class="title">
    <a href="{{ post.url }}">{{ post.title | escape }}</a>
  </h1>
  <h2 class="subtitle">{{ post.date | date: "%b %-d, %Y" }}</h2>
  {% endfor %}
</section>
