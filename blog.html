---
layout: page
nav_name: blog
title: scratch that
subtitle: just some thoughts and code
permalink: /blog/
---
<section class="section">
  <div class="container">
    {% for post in site.posts %}
      <h1 class="title">
        <a href="{{ post.url }}">{{ post.title | escape }}</a>
      </h1>

      <h2 class="subtitle">
        {{ post.date | date: "%b %-d, %Y" }}
      </h2>
    {% endfor %}

    <p class="has-text-centered">
      Subscribe via <a href="{{ "/blog/feed.xml" }}">RSS</a>
    </p>
  </div>
</section>
